<!DOCTYPE html>
<html lang="fi">
    <head>
	<title>
	    {% if section.title %}{{ section.title }}{% endif %}
	    {% if page.title %}{{ page.title }}{% endif %}
	    - Kallvik Surf Ry
	</title>
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/site.webmanifest">

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="title" content="Kallvik Surf Ry" />
	<meta name="description" content="Kallvik, surf, purjelauta, purjelautailu, surffaus, kite, windsurf, sup, silversand" />
	<meta property="og:title" content="Kallvik Surf" />
	<meta property="og:url" content="https://kallviksurf.fi" />

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
    </head>

    <body>
	<header class="header-nav">
	    <div class="header-nav-content">
		<div class="header-nav-content-container">
		    <a href="/" class="logo">
			<span>KALLVIKSURF</span>
		    </a>
		    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
		</div>

		<nav class="nav">
		    <ul role="navigation" id="main-nav">
			<li><a href="/" {% if current_path == "/" %}class="active"{% endif %}>Etusivu</a></li>
			<li><a href="/toiminta" {% if current_path is starting_with("/toiminta") %}class="active"{% endif %}>Toiminta</a></li>
			<li><a href="/koulutus" {% if current_path is starting_with("/koulutus") %}class="active"{% endif %}>Koulutus</a></li>
			<li><a href="/liittyminen" {% if current_path is starting_with("/liittyminen") %}class="active"{% endif %}>Jäsenyys</a></li>
			<li><a href="/videot" {% if current_path is starting_with("/videot") %}class="active"{% endif %}>Videot</a></li>
			<li><a href="/linkit" {% if current_path is starting_with("/linkit") %}class="active"{% endif %}>Linkit</a></li>
			<li><a href="/yhteystiedot" {% if current_path is starting_with("/yhteystiedot") %}class="active"{% endif %}>Yhteystiedot</a></li>
		    </ul>
		</nav>
	    </div>
	</header>

	<!-- Main content -->
	<main class="main">
	    {% block content %} {% endblock %}
	</main>

	<footer class="site-footer">
	    <div class="site-footer-content">
		<p>Kallvik Surf Ry &mdash; <a href="https://www.facebook.com/groups/kallviksurf" target="_blank" rel="noopener">Facebook</a></p>
		<p>&copy; {{ now() | date(format="%Y") }} Kallvik Surf Ry</p>
	    </div>
	</footer>

	<!-- Mobile menu toggle script -->
	<script>
	    document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
		document.getElementById('main-nav').classList.toggle('mobile-open');
		document.body.classList.toggle('mobile-menu-open');
	    });

	    window.matchMedia('(min-width: 901px)').addEventListener('change', function(e) {
		if (e.matches) {
		    document.getElementById('main-nav').classList.remove('mobile-open');
		    document.body.classList.remove('mobile-menu-open');
		}
	    });
	</script>
    </body>
</html>
