{% extends "base.html" %}

{% block content %}
    <!-- Hero Banner Section -->
    <section class="hero-banner">
        <div class="hero-banner-content">
            <div class="hero-text">
                <h1>{{ trans(key="site_name", lang=lang) }}</h1>
                <p class="hero-subtitle">{{ trans(key="hero_subtitle", lang=lang) }}</p>
                <div class="hero-cta-buttons">
                    <a href="https://club.kallviksurf.fi/join" class="cta-button cta-primary">{{ trans(key="hero_cta_join", lang=lang) }}</a>
                    <a href="{{ toiminta_path }}#koulutus" class="cta-button cta-secondary">{{ trans(key="hero_cta_learn", lang=lang) }}</a>
                </div>
            </div>
            <div class="hero-logo">
            <img src="/Home/low_res_banner.jpg" alt="KALLVIKSURF - SURFING SOCIETY">
            </div>
        </div>
    </section>

    <!-- Content Section -->
    <section class="content-section">
        {{ section.content | safe }}
    </section>
{% endblock content %}
